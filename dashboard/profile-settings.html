<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - BlogHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>
    <div class="d-flex min-vh-100">
        <!-- Sidebar -->
        <nav class="sidebar bg-dark text-light p-4"
            style="width: 260px; position: fixed; height: 100vh; overflow-y: auto;">
            <div class="mb-4">
                <a href="../index.html" class="text-light text-decoration-none d-flex align-items-center gap-2">
                    <i class="ri-quill-pen-line fs-5"></i>
                    <span class="fw-bold">BlogHub</span>
                </a>
            </div>

            <div class="mb-4">
                <h6 class="text-muted small text-uppercase">Menu</h6>
                <ul class="list-unstyled">
                    <li>
                        <a href="index.html"
                            class="nav-link text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-home-line"></i> Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="posts.html"
                            class="nav-link text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-article-line"></i> My Posts
                        </a>
                    </li>
                    <li>
                        <a href="create-post.html"
                            class="nav-link text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-pencil-line"></i> Create Post
                        </a>
                    </li>
                    <li>
                        <a href="profile-settings.html"
                            class="nav-link active text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-settings-line"></i> Settings
                        </a>
                    </li>
                </ul>
            </div>

            <hr class="bg-secondary">

            <div class="mb-4">
                <h6 class="text-muted small text-uppercase">Account</h6>
                <ul class="list-unstyled">
                    <li>
                        <a href="../profile.html"
                            class="nav-link text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-user-line"></i> View Profile
                        </a>
                    </li>
                    <li>
                        <a href="../index.html"
                            class="nav-link text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-logout-box-line"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-grow-1 ms-md-0" style="margin-left: 260px !important;">
            <!-- Top Bar -->
            <div class="bg-white shadow-sm sticky-top py-3 px-4 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold">Profile Settings</h5>
                <button class="btn btn-sm btn-light d-md-none">
                    <i class="ri-menu-line"></i>
                </button>
            </div>

            <!-- Content -->
            <div class="p-4">
                <div class="row g-4">
                    <!-- Main Settings -->
                    <div class="col-lg-8">
                        <!-- Profile Information -->
                        <div class="card shadow-sm border-0 mb-4">
                            <div class="card-header bg-white border-bottom py-3 px-4">
                                <h6 class="fw-bold mb-0">Profile Information</h6>
                            </div>
                            <div class="card-body p-4">
                                <form class="row">
                                    <!-- Profile Picture -->
                                    <div class="mb-4 col-md-12">
                                        <div class="d-flex align-items-center gap-4">
                                            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop"
                                                alt="Profile" class="rounded-circle" width="100" height="100">
                                            <div>
                                                <input type="file" class="form-control form-control-sm mb-2"
                                                    accept="image/*">
                                                <small class="text-muted">Recommended: Square image, minimum
                                                    400x400px</small>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Full Name -->
                                    <div class="mb-3 col-md-6">
                                        <label for="fullname" class="form-label fw-bold">Full Name</label>
                                        <input type="text" class="form-control" id="fullname" value="John Doe">
                                    </div>

                                    <!-- Email -->
                                    <div class="mb-3 col-md-6">
                                        <label for="email" class="form-label fw-bold">Email Address</label>
                                        <input type="email" class="form-control" id="email" value="john@example.com">
                                    </div>

                                    <!-- Bio -->
                                    <div class="mb-3 col-md-12">
                                        <label for="bio" class="form-label fw-bold">Bio</label>
                                        <textarea class="form-control" id="bio"
                                            rows="3">Full Stack Developer | Tech Enthusiast | Coffee Lover</textarea>
                                        <small class="text-muted">Max 150 characters</small>
                                    </div>

                                    <div>
                                        <button type="submit" class="btn btn-primary">
                                            <i class="ri-save-line"></i> Save Changes
                                        </button>
                                    </div>

                                </form>
                            </div>
                        </div>


                   
                    </div>

                    <!-- Sidebar Settings -->
                    <div class="col-lg-4">
                      <!-- Security Settings -->
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white border-bottom py-3 px-4">
                                <h6 class="fw-bold mb-0">Security & Password</h6>
                            </div>
                            <div class="card-body p-4">
                                <form>
                                    <div class="mb-3">
                                        <label for="current-password" class="form-label fw-bold">Current
                                            Password</label>
                                        <input type="password" class="form-control" id="current-password"
                                            placeholder="Enter your current password">
                                    </div>

                                    <div class="mb-3">
                                        <label for="new-password" class="form-label fw-bold">New Password</label>
                                        <input type="password" class="form-control" id="new-password"
                                            placeholder="Enter new password">
                                        <small class="text-muted">At least 8 characters with uppercase, lowercase, and
                                            numbers</small>
                                    </div>

                                    <div class="mb-4">
                                        <label for="confirm-password" class="form-label fw-bold">Confirm
                                            Password</label>
                                        <input type="password" class="form-control" id="confirm-password"
                                            placeholder="Confirm new password">
                                    </div>

                                    <button type="submit" class="btn btn-primary">
                                        <i class="ri-lock-line"></i> Update Password
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
