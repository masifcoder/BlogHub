<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - BlogHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
    <!-- Quill Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex min-vh-100">
        <!-- Sidebar -->
        <nav class="sidebar bg-dark text-light p-4"
            style="width: 260px; position: fixed; height: 100vh; overflow-y: auto;">
            <div class="mb-4">
                <a href="../index.html" class="text-light text-decoration-none d-flex align-items-center gap-2">
                    <i class="ri-quill-pen-line fs-5"></i>
                    <span class="fw-bold">BlogHub</span>
                </a>
            </div>

            <div class="mb-4">
                <h6 class="text-muted small text-uppercase">Menu</h6>
                <ul class="list-unstyled">
                    <li>
                        <a href="index.html"
                            class="nav-link text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-home-line"></i> Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="posts.html"
                            class="nav-link text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-article-line"></i> My Posts
                        </a>
                    </li>
                    <li>
                        <a href="create-post.html"
                            class="nav-link active text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-pencil-line"></i> Create Post
                        </a>
                    </li>
                    <li>
                        <a href="profile-settings.html"
                            class="nav-link text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-settings-line"></i> Settings
                        </a>
                    </li>
                </ul>
            </div>

            <hr class="bg-secondary">

            <div class="mb-4">
                <h6 class="text-muted small text-uppercase">Account</h6>
                <ul class="list-unstyled">
                    <li>
                        <a href="../profile.html"
                            class="nav-link text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-user-line"></i> View Profile
                        </a>
                    </li>
                    <li>
                        <a href="../index.html"
                            class="nav-link text-light d-flex align-items-center gap-3 px-3 py-2 rounded">
                            <i class="ri-logout-box-line"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-grow-1 ms-md-0" style="margin-left: 260px !important;">
            <!-- Top Bar -->
            <div class="bg-white shadow-sm sticky-top py-3 px-4 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold">Create New Post</h5>
                <button class="btn btn-sm btn-light d-md-none">
                    <i class="ri-menu-line"></i>
                </button>
            </div>

            <!-- Content -->
            <div class="p-4">
                <form>
                    <div class="row g-4">
                        <!-- Main Form -->
                        <div class="col-lg-8">
                            <!-- Title -->
                            <label for="title" class="form-label fw-bold">Post Title</label>
                            <input type="text" class="form-control" id="title" placeholder="Enter post title" required>
                        </div>

                        <div class="col-lg-4">
                            <!-- Category -->
                            <h6 class="fw-bold mb-3">Category</h6>
                            <select class="form-select" required>
                                <option>Select a category</option>
                                <option>Technology</option>
                                <option>Design</option>
                                <option>Business</option>
                                <option>Education</option>
                                <option>Lifestyle</option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <!-- Featured Image -->
                            <label class="form-label fw-bold"> Image</label>
                            <input type="file" class="form-control" accept="image/*">
                        </div>

                        <div class="col-md-12">
                            <!-- Content Editor -->

                            <label for="editor" class="form-label fw-bold mb-3">Content</label>
                            <div id="editor" style="height: 400px; background-color: white;">
                                <p>Start writing your amazing article here...</p>
                            </div>
                        </div>

                    </div>



                    <div class="mt-4 text-end">
                        <button type="submit" class="btn btn-primary btn-lg w-25">Publish</button>

                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Quill Editor -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });


        // 1. Select the form
        const form = document.querySelector('form');

        form.addEventListener('submit', (e) => {
            e.preventDefault(); // Stop page refresh

            // 2. Get the HTML content
            const postHTML = quill.root.innerHTML;

            // 3. Get other form data
            const postTitle = document.getElementById('title').value;

            console.log("Post Title:", postTitle);
            console.log("Editor HTML:", postHTML);

            alert("Check the console to see your HTML output!");

            // Now you can send 'postHTML' to your database/backend
        });


    </script>
</body>

</html>
